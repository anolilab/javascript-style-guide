name: "Tests"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    test:
        permissions:
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/test.yml@20b8733e71ebbb165d54fe8cede47e225985a58a" # v15.3.1+
        with:
            node_versions: "[\"22\", \"24\"]"
            os_matrix: "[\"ubuntu-latest\"]"
            extra_includes: "[{\"os\": \"macos-latest\", \"node\": \"22\"}, {\"os\": \"windows-latest\", \"node\": \"22\"}]"
            test_command: "pnpm build:packages && pnpm test:all"
            coverage: false
