name: "CodeQL"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
permissions: {}
jobs:
    codeql:
        permissions:
            security-events: "write"
            actions: "read"
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/codeql.yml@8249d8ea27b21190f8079df71fd7ba0c63f8d352" # v20.2.10
        with:
            languages: '["javascript-typescript"]'
            branches: '["main"]'
