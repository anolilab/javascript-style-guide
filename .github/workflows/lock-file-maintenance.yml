name: "Lock File Maintenance"

on: # yamllint disable-line rule:truthy
    schedule:
        - cron: "0 */3 * * *" # At minute 0 past every 3rd hour.
    pull_request:
        branches:
            - "dependabot/**"
    workflow_dispatch: # yamllint disable-line rule:empty-values

permissions:
    contents: "write" # for checkout and lock file updates

jobs:
    lock-file:
        uses: "anolilab/workflows/.github/workflows/pnpm-lock-file-maintenance.yml@8249d8ea27b21190f8079df71fd7ba0c63f8d352" # v20.2.10 # main
        with:
            target-repo: "anolilab/javascript-style-guide"
            node-version: "22.x"
            run-audit-fix: false
        secrets:
            github-token: "${{ secrets.LOCK_MAINTENANCE_GITHUB_TOKEN }}"
