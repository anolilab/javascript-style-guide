name: "Tests"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    test:
        permissions:
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/test.yml@5b340a228896b01f6d2b6f3bf3b574caed9ee89b" # v15.3.1+
        with:
            node_versions: "[\"22\", \"24\"]"
            os_matrix: "[\"ubuntu-latest\"]"
            extra_includes: "[{\"os\": \"macos-latest\", \"node\": \"22\"}]"
            test_command: "pnpm build:packages && pnpm test:all"
            coverage: false
