name: "Require 'Allow Edits'"

on: ["pull_request_target", "merge_group"] # yamllint disable-line rule:truthy

permissions:
    contents: "read"

jobs:
    check_allow_edits:
        if: github.event_name == 'pull_request_target' # yamllint disable-line rule:quoted-strings
        name: “Require Allow Edits” # yamllint disable-line rule:quoted-strings
        permissions:
            pull-requests: read # yamllint disable-line rule:quoted-strings
        runs-on: ubuntu-latest # yamllint disable-line rule:quoted-strings

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40" # v2.19.0
              with:
                  egress-policy: "audit"

            - uses: "ljharb/require-allow-edits@13f90bc8cc5de000f2b44a0e2c3a11d108e8cd9f" # main
              with:
                  pull_number: "${{ github.event.pull_request.number }}"
