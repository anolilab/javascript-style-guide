name: "Tests"
on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    test:
        permissions:
            contents: "read"
        uses: "anolilab/workflows/.github/workflows/test.yml@8249d8ea27b21190f8079df71fd7ba0c63f8d352" # v20.2.10
        with:
            node_versions: '["22", "24"]'
            os_matrix: '["ubuntu-latest"]'
            extra_includes: '[{"os": "macos-latest", "node": "22"}]'
            test_command: "pnpm build:packages && pnpm test:all"
            coverage: false
