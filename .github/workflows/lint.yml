name: "Lint"
on: # yamllint disable-line rule:truthy
    pull_request:
        branches: ["main"]
permissions: {}
jobs:
    lint:
        permissions:
            contents: "read"
            pull-requests: "read"
        uses: "anolilab/workflows/.github/workflows/lint.yml@8249d8ea27b21190f8079df71fd7ba0c63f8d352" # v20.2.10
        with:
            lint_eslint: true
            lint_types: true
            lint_attw: false
            lint_package_json: true
            lint_markdown: false
            lint_yaml: true
            lint_actionlint: true
            lint_rust: false
            node_version: "22"
