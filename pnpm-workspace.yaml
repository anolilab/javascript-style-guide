overrides:
    axios@>=1.0.0 <=1.13.4: ">=1.18.1"
    # GHSA-pmv8-rq9r-6j72, GHSA-xj6q-8x83-jv6g, GHSA-42h9-826w-cgv3 — all patched in 1.18.0
    axios@<1.18.0: ">=1.18.1"
    # GHSA-v422-hmwv-36x6
    body-parser@>=2.0.0 <2.3.0: ">=2.3.0"
    # GHSA-3jxr-9vmj-r5cp (ReDoS) — patched per major line: 1.1.16, 2.1.2, 5.0.7
    brace-expansion@1: ">=1.1.16"
    brace-expansion@2: ">=2.1.2"
    brace-expansion@>=3.0.0 <5.0.7: ">=5.0.7"
    chrono-node@<2.2.4: ">=2.10.0"
    defu@<=6.1.4: ">=6.1.7"
    # The published @anolilab/eslint-config pulls sonarjs 4.0.3 transitively, which reads
    # AST_NODE_TYPES.FunctionType at load and crashes against eslint 10.7. Sibling packages
    # lint themselves with the published config, so force the version this workspace uses.
    eslint-plugin-sonarjs@<4.2.0: ">=4.2.0"
    # GHSA-32gv-6cf3-8cmc
    fast-uri@>=3.0.0 <3.1.3: ">=3.1.4"
    follow-redirects@<=1.15.11: ">=1.16.0"
    # GHSA-p3x2-7fjr-vqmv (path traversal)
    "@hono/node-server@<2.0.5": ">=2.0.10"
    # GHSA-xgm2-5f3f-mvvc
    hono@<4.12.27: ">=4.12.30"
    ip-address@<=10.1.0: ">=10.2.0"
    lodash-es@<=4.17.23: ">=4.18.0"
    lodash-es@>=4.0.0 <=4.17.23: ">=4.18.0"
    lodash@<=4.17.23: ">=4.18.0"
    lodash@>=4.0.0 <=4.17.22: ">=4.18.1"
    lodash@>=4.0.0 <=4.17.23: ">=4.18.0"
    picomatch@>=4.0.0 <4.0.4: ">=4.0.5"
    postcss@<8.5.10: ">=8.5.19"
    shell-quote@>=1.1.0 <=1.8.3: ">=1.10.0"
    # GHSA-2p49-hgcm-8545
    svgo@>=4.0.0 <4.0.2: ">=4.0.2"
    tmp@<0.2.7: ">=0.2.7"
    undici@<6.23.0: ">=6.27.0"
    undici@<6.24.0: ">=6.27.0"
    undici@>=7.0.0 <7.28.0: "7.28.0"
    undici@>=8.0.0 <8.5.0: "8.7.0"
    "@actions/http-client>undici": "8.7.0"
    vite@>=7.0.0 <=7.3.1: ">=7.3.2"
    vite@>=7.1.0 <=7.3.1: ">=7.3.2"
    vite@>=8.0.0 <=8.0.15: ">=8.1.5"
    yaml@>=2.0.0 <2.8.3: ">=2.9.0"
    esbuild@>=0.27.3 <0.28.1: ">=0.28.1"
    form-data@>=4.0.0 <4.0.6: ">=4.0.6"
    # Stay on 4.x: js-yaml 5.x is ESM-only with no default export and breaks
    # multi-semantic-release's `import ... from "js-yaml"`. ^4.3.0 still patches GHSA-52cp-r559-cp3m.
    js-yaml@>=4.0.0 <4.3.0: "^4.3.0"

